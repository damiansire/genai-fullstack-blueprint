<div class="ai-execution-sandbox" aria-live="polite">
  @if (isEngineResolving()) {
    <div class="native-spinner-indicator" aria-label="Construyendo matriz dinámica..."></div>
  } @else if (resolvedComponentClass()) {
    <ng-container *ngComponentOutlet="
      resolvedComponentClass(); 
      inputs: computedDataBindings()">
    </ng-container>
  }
</div>
