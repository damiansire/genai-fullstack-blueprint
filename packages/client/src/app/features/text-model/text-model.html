<div class="feature-container">
  <header class="feature-header">
    <h1><span aria-hidden="true">{{ icons.robot }}</span> Text Model - Google Text Bison</h1>
    <p>Generate text using Google's Text Bison AI model</p>
  </header>

  <div class="feature-content">
    <app-text-model-form
      [form]="textForm"
      [loading]="textModelResource.isLoading()"
      (submitForm)="onSubmit()"
      (resetForm)="resetForm()"
    />

    @defer (when textModelResource.hasValue() || textModelResource.isLoading() || textModelResource.error()) {
      <app-model-response
        [loading]="textModelResource.isLoading()"
        [error]="textModelResource.error()?.message || null"
        [response]="textModelResource.value() ?? null"
        loadingMessage="Generating text response..."
        (retry)="textModelResource.reload()"
      >
        <app-text-model-response [response]="textModelResource.value() ?? null" />
      </app-model-response>
    }
  </div>
</div>
