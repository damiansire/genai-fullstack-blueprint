<div class="playground-container">
  <header class="playground-header">
    <div class="title-group">
      <span class="icon" aria-hidden="true">{{ icons.terminal }}</span>
      <div class="title-text">
        <h1>Prompt Playground</h1>
        <p>Edit System Prompts directly in the database without server restarts.</p>
      </div>
    </div>
  </header>

  <div class="playground-layout">
    <!-- DUMB COMPONENT 1: Prompt List (Sidebar) -->
    <app-prompt-list
      [prompts]="prompts()"
      [selectedPromptName]="selectedPromptName()"
      [isLoading]="isLoading()"
      [loadError]="loadError()"
      (onSelectPrompt)="selectPrompt($event)"
    >
    </app-prompt-list>

    <!-- Right Content: Editor -->
    <main class="editor-area">
      @if (selectedPrompt(); as prompt) {
        <!-- DUMB COMPONENT 2: Prompt Editor -->
        <app-prompt-editor
          [prompt]="prompt"
          [promptForm]="promptForm"
          [isSaving]="isSaving()"
          [saveSuccess]="saveSuccess()"
          [saveError]="saveError()"
          (onSubmit)="onSubmit()"
        >
        </app-prompt-editor>
      } @else {
        <div class="empty-selection">
          <span class="icon" aria-hidden="true">{{ icons.terminal }}</span>
          <h2>Select a prompt</h2>
          <p>Choose a prompt from the sidebar to edit its content.</p>
        </div>
      }
    </main>
  </div>
</div>
