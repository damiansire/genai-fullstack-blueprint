<div class="cg-layout">
  <!-- ─── Header ──────────────────────────────────────────────────────── -->
  <header class="cg-header">
    <h1 class="cg-header__title">⚡ Code Generator</h1>
    <p class="cg-header__desc">Spec → Code → Quality Analysis → Refinement (Patrón 10)</p>
  </header>

  <!-- DUMB COMPONENT 1: Configuración aislada -->
  <app-code-config 
    [languages]="languages"
    [langIcons]="langIcons"
    [activeLanguage]="language()"
    [specText]="spec()"
    [isGenerating]="isGenerating()"
    [isCaching]="isCaching()"
    (onLanguageSelect)="selectLanguage($event)"
    (onSpecChange)="onSpecInput($event)"
    (onGenerate)="generate()"
    (onLoadExample)="loadExample()">
  </app-code-config>

  <!-- ─── Error ───────────────────────────────────────────────────────── -->
  @if (error()) {
    <div class="cg-error" role="alert">⚠️ {{ error() }}</div>
  }

  <!-- DUMB COMPONENT 2: Resultados aislados -->
  @if (result(); as r) {
    <app-code-result 
      [result]="r"
      [langIcons]="langIcons"
      [copied]="copied()"
      (onCopyCode)="copyCode()">
    </app-code-result>
  }
</div>
