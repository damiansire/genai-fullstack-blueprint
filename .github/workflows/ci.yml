name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (a fresh push replaces an in-flight run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 covers the native features this repo relies on: TypeScript
          # execution via tsx, `node:test` module mocks, and `--env-file-if-exists`.
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # typecheck + lint + format:check + test for both workspaces (api, client).
      - name: Verify
        run: npm run ci

      # The README's test counts (scripts/update-metrics.mjs) must match the
      # suite that just ran above — catches README drift the moment a test is
      # added/removed instead of leaving a stale number.
      - name: Metrics drift check
        run: |
          node scripts/update-metrics.mjs
          git diff --exit-code README.md

      # Prove the deployable client bundle actually compiles in production mode
      # (the api has no build step — it runs TypeScript natively via tsx).
      - name: Build client (production bundle)
        run: npm run build:client

  # Prove the deployable system actually RUNS, not just that it builds: bring up
  # the full compose stack (API + client) from the shipped Dockerfiles, wait for
  # both healthchecks to report healthy, then smoke-test the live endpoints.
  # Build-only would miss runtime breakage (e.g. a missing flag or bad wiring).
  # No registry push — nothing leaves CI.
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # compose needs an env file (env_file: .env) and values for ${...}
      # interpolation. The env.example placeholders are enough to boot: the health
      # and /api/info paths need no real secrets (Gemini is only called on real
      # invoke requests), and API_KEY_1 gets a usable value from the example.
      - name: Prepare env
        run: cp env.example .env

      - name: Build images and start the stack (wait for healthchecks)
        run: docker compose up -d --build --wait --wait-timeout 240

      - name: Smoke-test the live stack
        run: |
          set -euo pipefail
          # API liveness + a free, no-auth, no-Gemini endpoint.
          curl -fsS http://localhost:3000/health/live | grep -q '"status":"live"'
          curl -fsS http://localhost:3000/api/info | grep -q 'AI Gateway API'
          # Client SPA served by nginx.
          test "$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8080/)" = "200"

      - name: Stack logs (on failure)
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
