name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (a fresh push replaces an in-flight run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 covers the native features this repo relies on: TypeScript
          # execution via tsx, `node:test` module mocks, and `--env-file-if-exists`.
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # typecheck + lint + format:check + test for both workspaces (api, client).
      - name: Verify
        run: npm run ci
